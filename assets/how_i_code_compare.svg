<svg width="1000" height="430" viewBox="0 0 1000 430" xmlns="http://www.w3.org/2000/svg">
  <rect x="0.5" y="0.5" width="999" height="420" rx="12" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <text x="500" y="45" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Quality &amp; Speed Comparison</text>
  
  <!-- Legend -->
  <rect x="380" y="70" width="16" height="16" rx="3" fill="#D4D4D8" />
  <text x="405" y="83" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#c9d1d9">Quality</text>
  
  <rect x="520" y="70" width="16" height="16" rx="3" fill="#71717A" />
  <text x="545" y="83" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#c9d1d9">Speed</text>

  <!-- Background grid lines -->
  <line x1="80" y1="130" x2="920" y2="130" stroke="#30363D" stroke-width="1" stroke-dasharray="4" />
  <line x1="80" y1="185" x2="920" y2="185" stroke="#30363D" stroke-width="1" stroke-dasharray="4" />
  <line x1="80" y1="240" x2="920" y2="240" stroke="#30363D" stroke-width="1" stroke-dasharray="4" />
  <line x1="80" y1="295" x2="920" y2="295" stroke="#30363D" stroke-width="1" stroke-dasharray="4" />
  <line x1="80" y1="350" x2="920" y2="350" stroke="#30363D" stroke-width="1" stroke-dasharray="4" />
  
  <!-- Y-Axis Labels -->
  <text x="70" y="134" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#c9d1d9" text-anchor="end">100%</text>
  <text x="70" y="189" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#c9d1d9" text-anchor="end">75%</text>
  <text x="70" y="244" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#c9d1d9" text-anchor="end">50%</text>
  <text x="70" y="299" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#c9d1d9" text-anchor="end">25%</text>
  <text x="70" y="354" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#c9d1d9" text-anchor="end">0%</text>

    <rect x="167" y="350" width="50" height="0" rx="6" fill="#D4D4D8">
