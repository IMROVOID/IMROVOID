name: Generate Metrics

on:
  schedule: # execute every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: metrics-isocalendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          committer_branch: output
          config_timezone: UTC
          config_custom_css: |
            svg { background-color: #000000; }
            * { color: #ffffff !important; }
            .calendar .day { fill: #1a1a1a; stroke: #333333; }
            .calendar .day[data-level="1"] { fill: #404040; stroke: #555555; }
            .calendar .day[data-level="2"] { fill: #808080; stroke: #999999; }
            .calendar .day[data-level="3"] { fill: #bfbfbf; stroke: #d9d9d9; }
            .calendar .day[data-level="4"] { fill: #ffffff; stroke: #ffffff; }
